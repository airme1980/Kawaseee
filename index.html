<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Kawasee | 為替換算ツール</title>
    <meta name="description" content="Kawasee は、日本円、米ドル、人民元、ユーロなどの主要通貨をすばやく換算できる無料の為替換算ツールです。海外旅行、海外通販、出張、家計管理に便利です。" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <h1>
        為替換算ツール
        <span>日本円・米ドル・人民元・ユーロをすばやく計算</span>
      </h1>
    </header>

    <main class="converter" aria-live="polite">
      <section class="quick-panel">
        <p class="section-label">よく使う通貨</p>
        <div id="quickCurrencies" class="quick-list"></div>
        <p class="quick-hint">任意の通貨欄に金額を入力すると、他の通貨に自動で反映されます。右側のボタンで値をコピーできます。</p>
        <p id="copyStatus" class="copy-status" aria-live="polite"></p>
        <p id="rateInfo" class="rate-info">レートを取得しています…</p>
      </section>

      <p id="timestamp" class="timestamp">最新レート取得中…</p>
      <p id="buildInfo" class="timestamp">Build: 読み込み中…</p>
      <section class="seo-description" aria-label="Kawaseeの説明">
        <p>Kawasee は、日本円、米ドル、人民元、ユーロなどの主要通貨をすばやく換算できる無料の為替換算ツールです。</p>
        <p>海外旅行、海外通販、出張、家計管理、ビジネスでの概算計算に利用できます。</p>
        <p>金額を入力すると、複数の通貨に自動で換算されます。</p>
      </section>
      <p class="disclaimer">※ 表示レートは参考値です。実際の取引レートとは異なる場合があります。</p>
    </main>

    <script>
      (function loadAppScript() {
        const fallbackVersion = Date.now().toString();
        const script = document.createElement('script');

        const buildInfoEl = document.getElementById('buildInfo');

        fetch(`version.json?_=${Date.now()}`, { cache: 'no-store' })
          .then((response) => (response.ok ? response.json() : null))
          .then((payload) => {
            const rawVersion = payload?.version || fallbackVersion;
            const version = encodeURIComponent(rawVersion);
            if (buildInfoEl) {
              buildInfoEl.textContent = `Build: ${rawVersion}`;
            }
            window.__APP_VERSION__ = rawVersion;
            script.src = `app.js?v=${version}`;
            document.body.appendChild(script);
          })
          .catch(() => {
            if (buildInfoEl) {
              buildInfoEl.textContent = `Build: ${fallbackVersion}`;
            }
            window.__APP_VERSION__ = fallbackVersion;
            script.src = `app.js?v=${fallbackVersion}`;
            document.body.appendChild(script);
          });
      })();
    </script>
  </body>
</html>
